<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .game-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .player-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            min-width: 150px;
            backdrop-filter: blur(10px);
        }

        .player-info h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .player-info .score {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }

        .player-info .controls {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        .player-info .controls kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-overlay h2 {
            color: #fff;
            font-size: 3rem;
        }

        .game-over-overlay .winner {
            color: #00ff88;
            font-size: 2rem;
        }

        .game-over-overlay button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-over-overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .instructions {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>🐍 双人贪吃蛇 🐍</h1>

    <div class="game-container">
        <div class="player-info">
            <h2>🟢 玩家一</h2>
            <div class="score" id="score1">0</div>
            <div class="controls">
                <kbd>W</kbd> 上<br>
                <kbd>S</kbd> 下<br>
                <kbd>A</kbd> 左<br>
                <kbd>D</kbd> 右
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div class="player-info">
            <h2>🔵 玩家二</h2>
            <div class="score" id="score2">0</div>
            <div class="controls">
                <kbd>↑</kbd> 上<br>
                <kbd>↓</kbd> 下<br>
                <kbd>←</kbd> 左<br>
                <kbd>→</kbd> 右
            </div>
        </div>
    </div>

    <p class="instructions">先吃到食物得1分，撞墙、撞自己或撞对方则游戏结束</p>

    <div class="game-over-overlay" id="gameOverOverlay">
        <h2>游戏结束!</h2>
        <div class="winner" id="winnerText"></div>
        <button onclick="restartGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Game state
        let snake1, snake2, food, score1, score2, gameOver, gameLoop;

        // Direction objects
        const directions = {
            UP: { x: 0, y: -1 },
            DOWN: { x: 0, y: 1 },
            LEFT: { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };

        // Initialize game
        function initGame() {
            snake1 = [
                { x: 5, y: Math.floor(tileCount / 2) },
                { x: 4, y: Math.floor(tileCount / 2) },
                { x: 3, y: Math.floor(tileCount / 2) }
            ];
            snake2 = [
                { x: tileCount - 6, y: Math.floor(tileCount / 2) },
                { x: tileCount - 5, y: Math.floor(tileCount / 2) },
                { x: tileCount - 4, y: Math.floor(tileCount / 2) }
            ];

            snake1.direction = directions.RIGHT;
            snake2.direction = directions.LEFT;
            snake1.nextDirection = directions.RIGHT;
            snake2.nextDirection = directions.LEFT;

            score1 = 0;
            score2 = 0;
            gameOver = false;

            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
            document.getElementById('gameOverOverlay').classList.remove('show');

            spawnFood();
        }

        // Spawn food at random position not occupied by snakes
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (
                snake1.some(seg => seg.x === newFood.x && seg.y === newFood.y) ||
                snake2.some(seg => seg.x === newFood.x && seg.y === newFood.y)
            );
            food = newFood;
        }

        // Draw everything on canvas
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake 1 (green)
            snake1.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                gradient.addColorStop(0, index === 0 ? '#00ff88' : '#00cc6a');
                gradient.addColorStop(1, index === 0 ? '#00cc6a' : '#009955');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    index === 0 ? 6 : 4
                );
                ctx.fill();

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = gridSize / 4;
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 - eyeOffset,
                        segment.y * gridSize + gridSize / 2 - eyeOffset / 2,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + eyeOffset,
                        segment.y * gridSize + gridSize / 2 - eyeOffset / 2,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            });

            // Draw snake 2 (blue)
            snake2.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                gradient.addColorStop(0, index === 0 ? '#00bfff' : '#0099cc');
                gradient.addColorStop(1, index === 0 ? '#0099cc' : '#007799');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    index === 0 ? 6 : 4
                );
                ctx.fill();

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = gridSize / 4;
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 - eyeOffset,
                        segment.y * gridSize + gridSize / 2 - eyeOffset / 2,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.arc(
                        segment.x * gridSize + gridSize / 2 + eyeOffset,
                        segment.y * gridSize + gridSize / 2 - eyeOffset / 2,
                        3,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            });
        }

        // Update game state
        function update() {
            if (gameOver) return;

            // Apply directions
            snake1.direction = snake1.nextDirection;
            snake2.direction = snake2.nextDirection;

            // Calculate new heads
            const head1 = {
                x: snake1[0].x + snake1.direction.x,
                y: snake1[1].y + snake1.direction.y
            };
            const head2 = {
                x: snake2[0].x + snake2.direction.x,
                y: snake2[0].y + snake2.direction.y
            };

            // Check wall collision
            if (head1.x < 0 || head1.x >= tileCount || head1.y < 0 || head1.y >= tileCount) {
                endGame('玩家二 🔵 获胜！');
                return;
            }
            if (head2.x < 0 || head2.x >= tileCount || head2.y < 0 || head2.y >= tileCount) {
                endGame('玩家一 🟢 获胜！');
                return;
            }

            // Check self collision
            if (snake1.some(seg => seg.x === head1.x && seg.y === head1.y)) {
                endGame('玩家二 🔵 获胜！');
                return;
            }
            if (snake2.some(seg => seg.x === head2.x && seg.y === head2.y)) {
                endGame('玩家一 🟢 获胜！');
                return;
            }

            // Check collision with other snake
            if (snake2.some(seg => seg.x === head1.x && seg.y === head1.y)) {
                endGame('玩家二 🔵 获胜！');
                return;
            }
            if (snake1.some(seg => seg.x === head2.x && seg.y === head2.y)) {
                endGame('玩家一 🟢 获胜！');
                return;
            }

            // Check head-to-head collision
            if (head1.x === head2.x && head1.y === head2.y) {
                endGame('平局！');
                return;
            }

            // Move snakes
            snake1.unshift(head1);
            snake2.unshift(head2);

            // Check food collision
            let ate1 = false, ate2 = false;
            if (head1.x === food.x && head1.y === food.y) {
                score1++;
                ate1 = true;
            }
            if (head2.x === food.x && head2.y === food.y) {
                score2++;
                ate2 = true;
            }

            if (ate1 || ate2) {
                if (!ate1) snake1.pop();
                if (!ate2) snake2.pop();
                spawnFood();
            } else {
                snake1.pop();
                snake2.pop();
            }

            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
        }

        // End the game
        function endGame(winnerMsg) {
            gameOver = true;
            clearInterval(gameLoop);
            document.getElementById('winnerText').textContent = winnerMsg;
            document.getElementById('gameOverOverlay').classList.add('show');
        }

        // Restart the game
        function restartGame() {
            clearInterval(gameLoop);
            initGame();
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 100);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // Prevent default for arrow keys to avoid scrolling
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
                e.preventDefault();
            }

            // Player 1 - WASD
            switch (key) {
                case 'w':
                    if (snake1.direction !== directions.DOWN) {
                        snake1.nextDirection = directions.UP;
                    }
                    break;
                case 's':
                    if (snake1.direction !== directions.UP) {
                        snake1.nextDirection = directions.DOWN;
                    }
                    break;
                case 'a':
                    if (snake1.direction !== directions.RIGHT) {
                        snake1.nextDirection = directions.LEFT;
                    }
                    break;
                case 'd':
                    if (snake1.direction !== directions.LEFT) {
                        snake1.nextDirection = directions.RIGHT;
                    }
                    break;
            }

            // Player 2 - Arrow keys
            switch (e.key) {
                case 'ArrowUp':
                    if (snake2.direction !== directions.DOWN) {
                        snake2.nextDirection = directions.UP;
                    }
                    break;
                case 'ArrowDown':
                    if (snake2.direction !== directions.UP) {
                        snake2.nextDirection = directions.DOWN;
                    }
                    break;
                case 'ArrowLeft':
                    if (snake2.direction !== directions.RIGHT) {
                        snake2.nextDirection = directions.LEFT;
                    }
                    break;
                case 'ArrowRight':
                    if (snake2.direction !== directions.LEFT) {
                        snake2.nextDirection = directions.RIGHT;
                    }
                    break;
            }
        });

        // Start the game
        initGame();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 100);
        draw();
    </script>
</body>
</html>
