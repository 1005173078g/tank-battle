<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.2em;
        }

        .score, .lives, .level {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        canvas {
            border: 3px solid #0ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            display: block;
        }

        .controls {
            margin-top: 20px;
            color: #aaa;
            text-align: center;
            font-size: 0.9em;
        }

        .controls p {
            margin: 5px 0;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .game-over h2 {
            color: #ff4444;
            font-size: 4em;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .game-over p {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .victory h2 {
            color: #44ff44;
            text-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 坦克大战</h1>
        <div class="info-panel">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">关卡: <span id="level">1</span></div>
            <div class="lives">生命: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <p>🎯 使用 <strong>WASD</strong> 或 <strong>方向键</strong> 移动坦克</p>
            <p>💥 按 <strong>空格键</strong> 或 <strong>J</strong> 发射子弹</p>
            <p>🏆 消灭所有敌方坦克进入下一关！</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="gameOverText">游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let lives = 3;
        let level = 1;
        let enemiesRemaining = 0;

        // 音效系统
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            switch(type) {
                case 'shoot':
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'explosion':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'hit':
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                    break;
            }
        }

        // 玩家坦克
        const player = {
            x: 300,
            y: 550,
            width: 40,
            height: 40,
            direction: 'up',
            speed: 3,
            color: '#00ff00',
            lastShot: 0,
            shootCooldown: 300
        };

        // 子弹数组
        let bullets = [];
        let enemyBullets = [];

        // 敌方坦克数组
        let enemies = [];

        // 障碍物数组
        let walls = [];

        // 爆炸效果
        let explosions = [];

        // 按键状态
        const keys = {
            up: false,
            down: false,
            left: false,
            right: false,
            shoot: false
        };

        // 生成障碍物
        function generateWalls() {
            walls = [];
            const wallCount = 15 + level * 3;

            for (let i = 0; i < wallCount; i++) {
                let wall;
                let attempts = 0;
                do {
                    wall = {
                        x: Math.floor(Math.random() * 14) * 40 + 20,
                        y: Math.floor(Math.random() * 12) * 40 + 60,
                        width: 40,
                        height: 40,
                        type: Math.random() > 0.3 ? 'brick' : 'steel',
                        health: Math.random() > 0.3 ? 2 : 999
                    };
                    attempts++;
                } while (attempts < 50 && isOverlapping(wall));

                if (attempts < 50) {
                    walls.push(wall);
                }
            }

            // 确保出生点周围没有墙
            walls = walls.filter(w =>
                !(w.x > 260 && w.x < 340 && w.y > 500 && w.y < 580) &&
                !(w.x > 100 && w.x < 180 && w.y > 500 && w.y < 580) &&
                !(w.x > 420 && w.x < 500 && w.y > 500 && w.y < 580)
            );
        }

        function isOverlapping(newWall) {
            // 检查是否与玩家出生点重叠
            if (newWall.x > 260 && newWall.x < 380 && newWall.y > 500) return true;

            // 检查是否与其他墙重叠
            return walls.some(w =>
                Math.abs(w.x - newWall.x) < 40 && Math.abs(w.y - newWall.y) < 40
            );
        }

        // 生成敌方坦克
        function generateEnemies() {
            enemies = [];
            const enemyCount = 3 + level;
            enemiesRemaining = enemyCount;

            const spawnPoints = [
                { x: 60, y: 60 },
                { x: 300, y: 60 },
                { x: 540, y: 60 }
            ];

            for (let i = 0; i < enemyCount; i++) {
                const spawn = spawnPoints[i % 3];
                const offset = Math.floor(i / 3) * 60;

                enemies.push({
                    x: spawn.x,
                    y: spawn.y + offset,
                    width: 40,
                    height: 40,
                    direction: 'down',
                    speed: 1 + level * 0.3,
                    color: '#ff4444',
                    lastShot: 0,
                    shootCooldown: 1500 - level * 100,
                    moveTimer: 0,
                    moveDirection: 'down'
                });
            }
        }

        // 绘制坦克
        function drawTank(tank, isPlayer = false) {
            ctx.save();
            ctx.translate(tank.x, tank.y);

            // 根据方向旋转
            let angle = 0;
            switch (tank.direction) {
                case 'up': angle = 0; break;
                case 'down': angle = Math.PI; break;
                case 'left': angle = -Math.PI / 2; break;
                case 'right': angle = Math.PI / 2; break;
            }
            ctx.rotate(angle);

            // 坦克主体
            ctx.fillStyle = tank.color;
            ctx.fillRect(-tank.width / 2, -tank.height / 2, tank.width, tank.height);

            // 坦克履带
            ctx.fillStyle = isPlayer ? '#00aa00' : '#aa0000';
            ctx.fillRect(-tank.width / 2 - 5, -tank.height / 2, 8, tank.height);
            ctx.fillRect(tank.width / 2 - 3, -tank.height / 2, 8, tank.height);

            // 坦克炮塔
            ctx.fillStyle = isPlayer ? '#00cc00' : '#cc0000';
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fill();

            // 坦克炮管
            ctx.fillStyle = isPlayer ? '#008800' : '#880000';
            ctx.fillRect(-4, -tank.height / 2 - 10, 8, 25);

            ctx.restore();
        }

        // 绘制障碍物
        function drawWalls() {
            walls.forEach(wall => {
                if (wall.type === 'brick') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(wall.x - wall.width / 2, wall.y - wall.height / 2, wall.width, wall.height);
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(wall.x - wall.width / 2, wall.y - wall.height / 2, wall.width, wall.height);

                    // 砖块纹理
                    ctx.beginPath();
                    ctx.moveTo(wall.x - wall.width / 2, wall.y);
                    ctx.lineTo(wall.x + wall.width / 2, wall.y);
                    ctx.moveTo(wall.x, wall.y - wall.height / 2);
                    ctx.lineTo(wall.x, wall.y + wall.height / 2);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#708090';
                    ctx.fillRect(wall.x - wall.width / 2, wall.y - wall.height / 2, wall.width, wall.height);
                    ctx.strokeStyle = '#2F4F4F';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(wall.x - wall.width / 2, wall.y - wall.height / 2, wall.width, wall.height);

                    // 钢铁纹理
                    ctx.fillStyle = '#A9A9A9';
                    ctx.fillRect(wall.x - 10, wall.y - 10, 20, 20);
                }
            });
        }

        // 绘制子弹
        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#ff6600';
            enemyBullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制爆炸效果
        function drawExplosions() {
            explosions.forEach((exp, index) => {
                const progress = exp.frame / exp.maxFrames;
                const radius = exp.radius * (1 + progress);
                const alpha = 1 - progress;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = `hsl(${30 + progress * 30}, 100%, 50%)`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                exp.frame++;
                if (exp.frame >= exp.maxFrames) {
                    explosions.splice(index, 1);
                }
            });
        }

        // 创建爆炸
        function createExplosion(x, y) {
            explosions.push({
                x: x,
                y: y,
                radius: 20,
                frame: 0,
                maxFrames: 20
            });
            playSound('explosion');
        }

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return Math.abs(rect1.x - rect2.x) < (rect1.width + rect2.width) / 2 &&
                   Math.abs(rect1.y - rect2.y) < (rect1.height + rect2.height) / 2;
        }

        // 玩家射击
        function playerShoot() {
            const now = Date.now();
            if (now - player.lastShot > player.shootCooldown) {
                let bx = player.x;
                let by = player.y;
                let bdx = 0, bdy = 0;

                switch (player.direction) {
                    case 'up': by -= 25; bdy = -10; break;
                    case 'down': by += 25; bdy = 10; break;
                    case 'left': bx -= 25; bdx = -10; break;
                    case 'right': bx += 25; bdx = 10; break;
                }

                bullets.push({ x: bx, y: by, dx: bdx, dy: bdy });
                player.lastShot = now;
                playSound('shoot');
            }
        }

        // 敌方坦克射击
        function enemyShoot(enemy) {
            const now = Date.now();
            if (now - enemy.lastShot > enemy.shootCooldown) {
                let bx = enemy.x;
                let by = enemy.y;
                let bdx = 0, bdy = 0;

                switch (enemy.direction) {
                    case 'up': by -= 25; bdy = -8; break;
                    case 'down': by += 25; bdy = 8; break;
                    case 'left': bx -= 25; bdx = -8; break;
                    case 'right': bx += 25; bdx = 8; break;
                }

                enemyBullets.push({ x: bx, y: by, dx: bdx, dy: bdy });
                enemy.lastShot = now;
            }
        }

        // 更新游戏状态
        function update() {
            if (!gameRunning) return;

            // 玩家移动
            let newX = player.x;
            let newY = player.y;

            if (keys.up) { newY -= player.speed; player.direction = 'up'; }
            if (keys.down) { newY += player.speed; player.direction = 'down'; }
            if (keys.left) { newX -= player.speed; player.direction = 'left'; }
            if (keys.right) { newX += player.speed; player.direction = 'right'; }

            // 边界检测
            newX = Math.max(20, Math.min(580, newX));
            newY = Math.max(20, Math.min(580, newY));

            // 墙壁碰撞
            const testPlayer = { x: newX, y: newY, width: player.width, height: player.height };
            let canMove = true;

            for (const wall of walls) {
                if (checkCollision(testPlayer, wall)) {
                    canMove = false;
                    break;
                }
            }

            // 敌方坦克碰撞
            if (canMove) {
                for (const enemy of enemies) {
                    if (checkCollision(testPlayer, enemy)) {
                        canMove = false;
                        break;
                    }
                }
            }

            if (canMove) {
                player.x = newX;
                player.y = newY;
            }

            // 玩家射击
            if (keys.shoot) {
                playerShoot();
            }

            // 更新玩家子弹
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;

                // 边界检测
                if (bullet.x < 0 || bullet.x > 600 || bullet.y < 0 || bullet.y > 600) {
                    return false;
                }

                // 墙壁碰撞
                for (let i = walls.length - 1; i >= 0; i--) {
                    const wall = walls[i];
                    if (Math.abs(bullet.x - wall.x) < wall.width / 2 &&
                        Math.abs(bullet.y - wall.y) < wall.height / 2) {
                        if (wall.type === 'brick') {
                            wall.health--;
                            if (wall.health <= 0) {
                                createExplosion(wall.x, wall.y);
                                walls.splice(i, 1);
                            }
                        }
                        playSound('hit');
                        return false;
                    }
                }

                // 击中敌方坦克
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    if (Math.abs(bullet.x - enemy.x) < enemy.width / 2 &&
                        Math.abs(bullet.y - enemy.y) < enemy.height / 2) {
                        createExplosion(enemy.x, enemy.y);
                        enemies.splice(i, 1);
                        score += 100;
                        enemiesRemaining--;
                        updateUI();

                        if (enemiesRemaining <= 0) {
                            level++;
                            if (level > 5) {
                                victory();
                            } else {
                                nextLevel();
                            }
                        }
                        return false;
                    }
                }

                return true;
            });

            // 更新敌方坦克
            enemies.forEach(enemy => {
                enemy.moveTimer++;

                // 随机改变方向
                if (enemy.moveTimer > 60 + Math.random() * 60) {
                    enemy.moveTimer = 0;
                    const directions = ['up', 'down', 'left', 'right'];
                    enemy.direction = directions[Math.floor(Math.random() * 4)];
                }

                // 向玩家移动的概率
                if (Math.random() < 0.02) {
                    if (player.x < enemy.x) enemy.direction = 'left';
                    else if (player.x > enemy.x) enemy.direction = 'right';
                    else if (player.y < enemy.y) enemy.direction = 'up';
                    else enemy.direction = 'down';
                }

                // 移动
                let newX = enemy.x;
                let newY = enemy.y;

                switch (enemy.direction) {
                    case 'up': newY -= enemy.speed; break;
                    case 'down': newY += enemy.speed; break;
                    case 'left': newX -= enemy.speed; break;
                    case 'right': newX += enemy.speed; break;
                }

                // 边界检测
                newX = Math.max(20, Math.min(580, newX));
                newY = Math.max(20, Math.min(580, newY));

                // 碰撞检测
                const testEnemy = { x: newX, y: newY, width: enemy.width, height: enemy.height };
                let canMove = true;

                // 墙壁碰撞
                for (const wall of walls) {
                    if (checkCollision(testEnemy, wall)) {
                        canMove = false;
                        enemy.moveTimer = 100; // 强制改变方向
                        break;
                    }
                }

                // 与其他敌方坦克碰撞
                if (canMove) {
                    for (const other of enemies) {
                        if (other !== enemy && checkCollision(testEnemy, other)) {
                            canMove = false;
                            enemy.moveTimer = 100;
                            break;
                        }
                    }
                }

                // 与玩家碰撞
                if (canMove && checkCollision(testEnemy, player)) {
                    canMove = false;
                    enemy.moveTimer = 100;
                }

                if (canMove) {
                    enemy.x = newX;
                    enemy.y = newY;
                }

                // 射击
                if (Math.random() < 0.02) {
                    enemyShoot(enemy);
                }
            });

            // 更新敌方子弹
            enemyBullets = enemyBullets.filter(bullet => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;

                // 边界检测
                if (bullet.x < 0 || bullet.x > 600 || bullet.y < 0 || bullet.y > 600) {
                    return false;
                }

                // 墙壁碰撞
                for (let i = walls.length - 1; i >= 0; i--) {
                    const wall = walls[i];
                    if (Math.abs(bullet.x - wall.x) < wall.width / 2 &&
                        Math.abs(bullet.y - wall.y) < wall.height / 2) {
                        if (wall.type === 'brick') {
                            wall.health--;
                            if (wall.health <= 0) {
                                createExplosion(wall.x, wall.y);
                                walls.splice(i, 1);
                            }
                        }
                        return false;
                    }
                }

                // 击中玩家
                if (Math.abs(bullet.x - player.x) < player.width / 2 &&
                    Math.abs(bullet.y - player.y) < player.height / 2) {
                    createExplosion(player.x, player.y);
                    lives--;
                    updateUI();

                    if (lives <= 0) {
                        gameOver();
                    } else {
                        // 重置玩家位置
                        player.x = 300;
                        player.y = 550;
                    }
                    return false;
                }

                return true;
            });
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格背景
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 绘制障碍物
            drawWalls();

            // 绘制敌方坦克
            enemies.forEach(enemy => drawTank(enemy, false));

            // 绘制玩家坦克
            drawTank(player, true);

            // 绘制子弹
            drawBullets();

            // 绘制爆炸效果
            drawExplosions();
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('gameOverText').textContent = '游戏结束';
            document.getElementById('gameOverText').parentElement.className = 'game-over';
            document.getElementById('finalScore').textContent = score;
        }

        // 胜利
        function victory() {
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('gameOverText').textContent = '恭喜通关！';
            document.getElementById('gameOverText').parentElement.className = 'game-over victory';
            document.getElementById('finalScore').textContent = score;
        }

        // 下一关
        function nextLevel() {
            player.x = 300;
            player.y = 550;
            bullets = [];
            enemyBullets = [];
            explosions = [];
            generateWalls();
            generateEnemies();
            updateUI();
        }

        // 重新开始
        function restartGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            level = 1;
            player.x = 300;
            player.y = 550;
            player.direction = 'up';
            bullets = [];
            enemyBullets = [];
            explosions = [];

            document.getElementById('gameOver').style.display = 'none';

            generateWalls();
            generateEnemies();
            updateUI();
        }

        // 游戏主循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    keys.up = true;
                    e.preventDefault();
                    break;
                case 's':
                case 'arrowdown':
                    keys.down = true;
                    e.preventDefault();
                    break;
                case 'a':
                case 'arrowleft':
                    keys.left = true;
                    e.preventDefault();
                    break;
                case 'd':
                case 'arrowright':
                    keys.right = true;
                    e.preventDefault();
                    break;
                case ' ':
                case 'j':
                    keys.shoot = true;
                    e.preventDefault();
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    keys.up = false;
                    break;
                case 's':
                case 'arrowdown':
                    keys.down = false;
                    break;
                case 'a':
                case 'arrowleft':
                    keys.left = false;
                    break;
                case 'd':
                case 'arrowright':
                    keys.right = false;
                    break;
                case ' ':
                case 'j':
                    keys.shoot = false;
                    break;
            }
        });

        // 初始化游戏
        generateWalls();
        generateEnemies();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
