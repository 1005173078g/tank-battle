<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 3em;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 700px;
            margin: 0 auto;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .game-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .game-desc {
            color: #aaa;
            font-size: 0.9em;
        }

        .game-card.tank {
            border: 2px solid #00ff00;
        }

        .game-card.tank:hover {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .game-card.snake {
            border: 2px solid #4ecdc4;
        }

        .game-card.snake:hover {
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 游戏集合</h1>
        <div class="games-grid">
            <a href="tank-game.html" class="game-card tank">
                <div class="game-icon">🎖️</div>
                <div class="game-title">坦克大战</div>
                <div class="game-desc">经典坦克对战游戏，消灭所有敌方坦克！</div>
            </a>
            <a href="snake-game.html" class="game-card snake">
                <div class="game-icon">🐍</div>
                <div class="game-title">贪吃蛇</div>
                <div class="game-desc">经典贪吃蛇游戏，吃到食物会变长！</div>
            </a>
        </div>
    </div>
</body>
</html>
