    color: #fff;

#game-over-screen h1 { color: #ff4444; text-shadow: 0 0 30px #ff0000; }
#win-screen h1 { color: #44ff44; text-shadow: 0 0 30px #00ff00; }
#start-screen h1 { color: #ffff44; text-shadow: 0 0 30px #ffff00; }

.score-display {
    font-size: 24px;
    margin: 10px 0;
    color: #aaa;
}

button {
    margin-top: 30px;
    padding: 15px 50px;
    font-size: 22px;
    font-family: 'Courier New', monospace;
    background: #222;
    color: #0f0;
    border: 2px solid #0f0;

}

button:hover {

}

.controls-info {

    left: 10px;

}

// ==================== 坦克类 ====================
class Tank {
    constructor(x, y, dir, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.dir = dir; // 0:up 1:right 2:down 3:left
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = isPlayer ? 2.5 : 1.2;
        this.size = TILE_SIZE - 4;
        this.halfSize = this.size / 2;
        this.shootCooldown = 0;
        this.shootDelay = isPlayer ? 15 : 50;
        this.hp = isPlayer ? 1 : 1;
        this.moveTimer = 0;
        this.moveDir = dir;
        this.flashTimer = 0; // invincibility flash after spawn
    }

    getBounds() {
        return {
            left: this.x - this.halfSize,
            right: this.x + this.halfSize,
            top: this.y - this.halfSize,
            bottom: this.y + this.halfSize,
        };
    }

    collidesWithMap(dx, dy) {
        const newBounds = {
            left: this.x + dx - this.halfSize,
            right: this.x + dx + this.halfSize,
            top: this.y + dy - this.halfSize,
            bottom: this.y + dy + this.halfSize,
        };

        // Boundary check
        if (newBounds.left < 0 || newBounds.right > CANVAS_W ||
            newBounds.top < 0 || newBounds.bottom > CANVAS_H) {
            return true;
        }

        // Map tile collision
        const checkTiles = [TILE.BRICK, TILE.STEEL, TILE.WATER, TILE.BASE];
        const left = Math.floor(newBounds.left / TILE_SIZE);
        const right = Math.floor((newBounds.right - 0.01) / TILE_SIZE);
        const top = Math.floor(newBounds.top / TILE_SIZE);
        const bottom = Math.floor((newBounds.bottom - 0.01) / TILE_SIZE);

        for (let row = top; row <= bottom; row++) {
            for (let col = left; col <= right; col++) {
                if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                    const tile = map[row * COLS + col];
                    if (tile === TILE.BRICK || tile === TILE.STEEL || tile === TILE.BASE) {
                        return true;
                    }
                }
            }
        }
        return false;
    }

    collidesWithTank(other) {
        const dx = this.x - other.x;
        const dy = this.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < this.size;
    }

    update() {
        if (this.flashTimer > 0) this.flashTimer--;
        if (this.shootCooldown > 0) this.shootCooldown--;

        if (this.isPlayer) {
            // Player input
            let dx = 0, dy = 0;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) { dy = -this.speed; this.dir = 0; }
            else if (keys['ArrowDown'] || keys['s'] || keys['S']) { dy = this.speed; this.dir = 2; }
            else if (keys['ArrowLeft'] || keys['a'] || keys['A']) { dx = -this.speed; this.dir = 3; }
            else if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = this.speed; this.dir = 1; }

            if (dx !== 0 || dy !== 0) {
                if (!this.collidesWithMap(dx, dy)) {
                    let blocked = false;
                    for (const enemy of enemies) {
                        if (this.collidesWithTank(enemy)) { blocked = true; break; }
                    }
                    if (!blocked) {
                        this.x += dx;
                        this.y += dy;
                    }
                }
            }

            if ((keys[' '] || keys['Space']) && this.shootCooldown <= 0) {
                this.shoot();
            }
        } else {
            // Enemy AI
            this.moveTimer--;
            if (this.moveTimer <= 0) {
                this.moveTimer = 40 + Math.floor(Math.random() * 80);
                this.dir = Math.floor(Math.random() * 4);
            }

            let dx = 0, dy = 0;
            if (this.dir === 0) dy = -this.speed;
            else if (this.dir === 2) dy = this.speed;
            else if (this.dir === 3) dx = -this.speed;
            else if (this.dir === 1) dx = this.speed;

            if (this.collidesWithMap(dx, dy)) {
                this.dir = Math.floor(Math.random() * 4);
                this.moveTimer = 10 + Math.floor(Math.random() * 30);
            } else {
                let blocked = false;
                for (const other of enemies) {
                    if (other !== this && this.collidesWithTank(other)) { blocked = true; break; }
                }
                if (this.collidesWithTank(player)) blocked = true;

                if (blocked) {
                    this.dir = Math.floor(Math.random() * 4);
                } else {
                    this.x += dx;
                    this.y += dy;
                }
            }

            // Random shooting
            if (this.shootCooldown <= 0 && Math.random() < 0.02) {
                this.shoot();
            }
        }
    }

    shoot() {
        let bx = this.x, by = this.y;
        const offset = this.halfSize + 4;
        if (this.dir === 0) by -= offset;
        else if (this.dir === 2) by += offset;
        else if (this.dir === 3) bx -= offset;
        else if (this.dir === 1) bx += offset;

        bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
        this.shootCooldown = this.shootDelay;
    }

    draw(ctx) {
        if (this.flashTimer > 0 && Math.floor(this.flashTimer / 4) % 2 === 0) return;

        ctx.save();
        ctx.translate(this.x, this.y);

        // Rotate based on direction
        const angles = [-Math.PI / 2, 0, Math.PI / 2, Math.PI]; // up, right, down, left
        ctx.rotate(angles[this.dir]);

        const s = this.halfSize;

        // Tank body
        ctx.fillStyle = this.color;
        ctx.fillRect(-s + 2, -s + 4, s * 2 - 4, s * 2 - 8);

        // Tracks
        ctx.fillStyle = this.isPlayer ? '#1a5c1a' : '#5c1a1a';
        ctx.fillRect(-s, -s, 6, s * 2);      // left track
        ctx.fillRect(s - 6, -s, 6, s * 2);    // right track

        // Track details
        ctx.fillStyle = '#333';
        for (let i = -s + 4; i < s - 2; i += 6) {
            ctx.fillRect(-s + 1, i, 4, 3);
            ctx.fillRect(s - 5, i, 4, 3);
        }

        // Turret base
        ctx.fillStyle = this.isPlayer ? '#2a8c2a' : '#8c2a2a';
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.45, 0, Math.PI * 2);
        ctx.fill();

        // Barrel
        ctx.fillStyle = this.isPlayer ? '#3a3' : '#a33';
        ctx.fillRect(-3, -s - 2, 6, s - 2);

        ctx.restore();

        // HP bar for enemy tanks with extra HP
        if (!this.isPlayer && this.hp > 1) {
            const hpW = this.size;
            ctx.fillStyle = '#333';
            ctx.fillRect(this.x - hpW / 2, this.y - this.halfSize - 10, hpW, 4);
            ctx.fillStyle = '#f55';
            ctx.fillRect(this.x - hpW / 2, this.y - this.halfSize - 10, hpW * (this.hp / 3), 4);
        }
    }
}

// ==================== 子弹类 ====================
class Bullet {
    constructor(x, y, dir, isPlayerBullet) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.speed = 5;
        this.size = 4;
        this.isPlayerBullet = isPlayerBullet;
        this.alive = true;
    }

    update() {
        if (this.dir === 0) this.y -= this.speed;
        else if (this.dir === 2) this.y += this.speed;
        else if (this.dir === 3) this.x -= this.speed;
        else if (this.dir === 1) this.x += this.speed;

        // Out of bounds
        if (this.x < 0 || this.x > CANVAS_W || this.y < 0 || this.y > CANVAS_H) {
            this.alive = false;
            return;
        }

        // Map collision
        const col = Math.floor(this.x / TILE_SIZE);
        const row = Math.floor(this.y / TILE_SIZE);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            const tile = map[row * COLS + col];
            if (tile === TILE.BRICK) {
                map[row * COLS + col] = TILE.EMPTY;
                spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#c84');
                this.alive = false;
                return;
            } else if (tile === TILE.STEEL) {
                spawnParticles(this.x, this.y, '#fff');
                this.alive = false;
                return;
            } else if (tile === TILE.BASE) {
                map[row * COLS + col] = TILE.EMPTY;
                spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#f00', 20);
                gameOver();
                this.alive = false;
                return;
            }
        }
    }

    draw(ctx) {
        ctx.fillStyle = this.isPlayerBullet ? '#ff0' : '#f66';
        ctx.shadowColor = this.isPlayerBullet ? '#ff0' : '#f00';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// ==================== 粒子系统 ====================
function spawnParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 20 + Math.random() * 10,
            maxLife: 30,
            color,
            size: 1 + Math.random() * 3,
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles(ctx) {
    for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

// ==================== 道具系统 ====================
const POWERUP_TYPES = [
    { type: 'star', color: '#ff0', label: '★', effect: 'powerup_star' },
    { type: 'tank', color: '#0f0', label: '🛡', effect: 'extra_life' },
    { type: 'bomb', color: '#f00', label: '💣', effect: 'clear_enemies' },
    { type: 'clock', color: '#0ff', label: '⏱', effect: 'freeze' },
];

function spawnPowerUp(x, y) {
    if (Math.random() < 0.2) {
        const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        powerUps.push({
            x, y,
            type,
            life: 400,
            flashTimer: 0,
        });
    }
}

function updatePowerUps() {
    for (let i = powerUps.length - 1; i >= 0; i--) {
        powerUps[i].life--;
        powerUps[i].flashTimer++;
        if (powerUps[i].life <= 0) {
            powerUps.splice(i, 1);
        }
    }
}

function drawPowerUps(ctx) {
    for (const pu of powerUps) {
        if (pu.life < 60 && Math.floor(pu.life / 8) % 2 === 0) continue;
        ctx.save();
        ctx.fillStyle = pu.type.color;
        ctx.shadowColor = pu.type.color;
        ctx.shadowBlur = 10;
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pu.type.label, pu.x, pu.y);
        ctx.restore();
    }
}

// ==================== 游戏逻辑 ====================
function loadLevel(lvl) {
    const idx = Math.min(lvl - 1, levelMaps.length - 1);
    map = [...levelMaps[idx]];
    // Base position: bottom center
    const baseCol = Math.floor(COLS / 2);
    const baseRow = ROWS - 1;
    map[baseRow * COLS + baseCol] = TILE.BASE;
}

function spawnPlayer() {
    player = new Tank(CANVAS_W / 2, CANVAS_H - TILE_SIZE * 2, 0, '#4a4', true);
    player.flashTimer = 60;
}

function spawnEnemy() {
    if (enemiesRemaining <= 0 || enemiesOnField >= maxEnemiesOnField) return;

    // 3 spawn points: top-left, top-center, top-right
    const spawns = [
        { x: TILE_SIZE, y: TILE_SIZE },
        { x: CANVAS_W / 2, y: TILE_SIZE },
        { x: CANVAS_W - TILE_SIZE, y: TILE_SIZE },
    ];

    // Filter spawns not blocked by other tanks
    const validSpawns = spawns.filter(s => {
        for (const e of enemies) {
            const dx = s.x - e.x, dy = s.y - e.y;
            if (Math.sqrt(dx * dx + dy * dy) < TILE_SIZE * 1.5) return false;
        }
        if (player) {
            const dx = s.x - player.x, dy = s.y - player.y;
            if (Math.sqrt(dx * dx + dy * dy) < TILE_SIZE * 1.5) return false;
        }
        return true;
    });

    if (validSpawns.length === 0) return;

    const spawn = validSpawns[Math.floor(Math.random() * validSpawns.length)];

    // Higher levels have tougher enemies
    let hp = 1;
    let color = '#e44';
    if (level >= 3 && Math.random() < 0.3) { hp = 2; color = '#e84'; }
    if (level >= 5 && Math.random() < 0.2) { hp = 3; color = '#f44'; }

    const enemy = new Tank(spawn.x, spawn.y, 2, color, false);
    enemy.hp = hp;
    enemy.flashTimer = 40;
    enemies.push(enemy);
    enemiesOnField++;
    enemiesRemaining--;
}

function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    enemiesTotal = 20;
    startLevel();
}

function startLevel() {
    player = null;
    enemies = [];
    bullets = [];
    particles = [];
    powerUps = [];
    enemiesRemaining = enemiesTotal;
    enemiesOnField = 0;
    enemySpawnTimer = 0;
    maxEnemiesOnField = Math.min(4 + Math.floor(level / 2), 8);
    enemySpawnInterval = Math.max(40, 90 - level * 5);

    loadLevel(level);
    spawnPlayer();

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'none';

    gameRunning = true;
    updateUI();
}

function restartGame() {
    startGame();
}

function nextLevel() {
    level++;
    enemiesTotal += 2;
    startLevel();
}

function gameOver() {
    gameRunning = false;
    document.getElementById('game-over-screen').style.display = 'flex';
    document.getElementById('final-score').textContent = score;
}

function winLevel() {
    gameRunning = false;
    if (level >= levelMaps.length * 3) {
        // Ultimate victory
        document.getElementById('win-screen').querySelector('h1').textContent = '👑 通关!';
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-score').textContent = score;
        // Reset button text
        document.getElementById('win-screen').querySelector('button').textContent = '重新开始';
        document.getElementById('win-screen').querySelector('button').onclick = restartGame;
    } else {
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-screen').querySelector('h1').textContent = '🎉 胜利!';
        document.getElementById('win-screen').querySelector('button').textContent = '下一关';
        document.getElementById('win-screen').querySelector('button').onclick = nextLevel;
        document.getElementById('win-score').textContent = score;
    }
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('enemies-left').textContent = enemiesRemaining + enemiesOnField;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

// ==================== 碰撞检测 ====================
function bulletHitsTank(bullet, tank) {
    const dx = bullet.x - tank.x;
    const dy = bullet.y - tank.y;
    return Math.sqrt(dx * dx + dy * dy) < tank.halfSize;
}

function handleCollisions() {
    // Bullet vs Tank collisions
    for (let b = bullets.length - 1; b >= 0; b--) {
        const bullet = bullets[b];
        if (!bullet.alive) continue;

        if (bullet.isPlayerBullet) {
            // Player bullet vs enemies
            for (let e = enemies.length - 1; e >= 0; e--) {
                const enemy = enemies[e];
                if (bulletHitsTank(bullet, enemy)) {
                    bullet.alive = false;
                    enemy.hp--;
                    if (enemy.hp <= 0) {
                        spawnParticles(enemy.x, enemy.y, enemy.color, 12);
                        spawnPowerUp(enemy.x, enemy.y);
                        score += 100;
                        enemies.splice(e, 1);
                        enemiesOnField--;
                        updateUI();

                        if (enemiesRemaining <= 0 && enemiesOnField <= 0) {
                            winLevel();
                        }
                    } else {
                        spawnParticles(bullet.x, bullet.y, '#f80', 4);
                    }
                    break;
                }
            }
        } else {
            // Enemy bullet vs player
            if (bulletHitsTank(bullet, player) && player.flashTimer <= 0) {
                bullet.alive = false;
                lives--;
                spawnParticles(player.x, player.y, player.color, 15);
                updateUI();
                if (lives <= 0) {
                    gameOver();
                } else {
                    // Respawn player
                    player.x = CANVAS_W / 2;
                    player.y = CANVAS_H - TILE_SIZE * 2;
                    player.dir = 0;
                    player.flashTimer = 90;
                }
            }
        }
    }

    // Clean up dead bullets
    bullets = bullets.filter(b => b.alive);

    // Bullet vs Bullet collisions
    for (let i = 0; i < bullets.length; i++) {
        for (let j = i + 1; j < bullets.length; j++) {
            const a = bullets[i], bb = bullets[j];
            if (a.isPlayerBullet !== bb.isPlayerBullet) {
                const dx = a.x - bb.x, dy = a.y - bb.y;
                if (Math.sqrt(dx * dx + dy * dy) < 6) {
                    a.alive = false;
                    bb.alive = false;
                    spawnParticles((a.x + bb.x) / 2, (a.y + bb.y) / 2, '#fff', 5);
                }
            }
        }
    }
    bullets = bullets.filter(b => b.alive);

    // Player vs PowerUp
    for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        const dx = player.x - pu.x, dy = player.y - pu.y;
        if (Math.sqrt(dx * dx + dy * dy) < TILE_SIZE) {
            applyPowerUp(pu);
            powerUps.splice(i, 1);
        }
    }

    // Player vs Enemy tank collision damage
    if (player && player.flashTimer <= 0) {
        for (const enemy of enemies) {
            if (player.collidesWithTank(enemy)) {
                // Push apart
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    const pushX = (dx / dist) * 2;
                    const pushY = (dy / dist) * 2;
                    if (!player.collidesWithMap(pushX, pushY)) {
                        player.x += pushX;
                        player.y += pushY;
                    }
                    if (!enemy.collidesWithMap(-pushX, -pushY)) {
                        enemy.x -= pushX;
                        enemy.y -= pushY;
                    }
                }
            }
        }
    }
}

function applyPowerUp(pu) {
    switch (pu.type.effect) {
        case 'powerup_star':
            // Increase player power
            player.shootDelay = Math.max(5, player.shootDelay - 3);
            score += 50;
            break;
        case 'extra_life':
            lives = Math.min(lives + 1, 9);
            score += 30;
            break;
        case 'clear_enemies':
            for (const enemy of enemies) {
                spawnParticles(enemy.x, enemy.y, '#f80', 10);
                score += 50;
            }
            enemiesOnField -= enemies.length;
            enemies = [];
            score += 30;
            break;
        case 'freeze':
            // Freeze all enemies temporarily
            for (const enemy of enemies) {
                enemy.moveTimer = 120;
                enemy.shootCooldown = 120;
            }
            score += 20;
            break;
    }
    updateUI();
}

// ==================== 地图绘制 ====================
function drawMap(ctx) {
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const tile = map[row * COLS + col];
            const x = col * TILE_SIZE;
            const y = row * TILE_SIZE;

            switch (tile) {
                case TILE.BRICK:
                    ctx.fillStyle = '#b5651d';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    // Brick pattern
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(x, y, TILE_SIZE, 2);
                    ctx.fillRect(x, y + TILE_SIZE / 2, TILE_SIZE, 2);
                    ctx.fillRect(x + TILE_SIZE / 2, y, 2, TILE_SIZE);
                    ctx.fillRect(x + TILE_SIZE / 4, y + TILE_SIZE / 4, 2, TILE_SIZE / 4);
                    ctx.fillRect(x + 3 * TILE_SIZE / 4, y + 3 * TILE_SIZE / 4, 2, TILE_SIZE / 4);
                    break;
                case TILE.STEEL:
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.fillStyle = '#999';
                    ctx.fillRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    break;
                case TILE.WATER:
                    ctx.fillStyle = '#2244aa';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#3355cc';
                    const waveOffset = Math.sin(frameCount * 0.1 + col + row) * 3;
                    ctx.fillRect(x + 3, y + 8 + waveOffset, TILE_SIZE - 6, 3);
                    ctx.fillRect(x + 3, y + 20 + waveOffset, TILE_SIZE - 6, 3);
                    break;
                case TILE.TREE:
                    ctx.fillStyle = '#1a5c1a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#2a7c2a';
                    ctx.beginPath();
                    ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#1a6c1a';
                    ctx.beginPath();
                    ctx.arc(x + TILE_SIZE / 3, y + TILE_SIZE / 3, TILE_SIZE / 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 2 * TILE_SIZE / 3, y + 2 * TILE_SIZE / 3, TILE_SIZE / 4, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case TILE.BASE:
                    // Draw base eagle
                    ctx.fillStyle = '#333';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = '24px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🦅', x + TILE_SIZE / 2, y + TILE_SIZE / 2);
                    break;
                default:
                    // Draw subtle grid on empty
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.strokeStyle = '#222';
                    ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            }
        }
    }
}

// ==================== 渲染 ====================
function draw() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Background
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    drawMap(ctx);

    // Draw trees after tanks (on top) so tanks are partially hidden
    // First pass: tanks and bullets under trees
    // We draw trees again semi-transparently over tanks

    // Bullets
    for (const bullet of bullets) {
        bullet.draw(ctx);
    }

    // Draw power-ups
    drawPowerUps(ctx);

    // Enemies
    for (const enemy of enemies) {
        enemy.draw(ctx);
    }

    // Player
    if (player && lives > 0) {
        player.draw(ctx);
    }

    // Particles
    drawParticles(ctx);

    // Trees overlay (semi-transparent to hide tanks partially)
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            if (map[row * COLS + col] === TILE.TREE) {
                const x = col * TILE_SIZE, y = row * TILE_SIZE;
                ctx.globalAlpha = 0.55;
                ctx.fillStyle = '#1a5c1a';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#2a7c2a';
                ctx.beginPath();
                ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
    }
}

// ==================== 游戏循环 ====================
function gameLoop() {
    if (!gameRunning) {
        requestAnimationFrame(gameLoop);
        return;
    }

    frameCount++;

    // Spawn enemies
    enemySpawnTimer++;
    if (enemySpawnTimer >= enemySpawnInterval && enemiesRemaining > 0) {
        enemySpawnTimer = 0;
        spawnEnemy();
    }

    // Update player
    if (player) player.update();

    // Update enemies
    for (const enemy of enemies) enemy.update();

    // Update bullets
    for (const bullet of bullets) bullet.update();

    // Handle collisions
    handleCollisions();

    // Update particles
    updateParticles();

    // Update power-ups
    updatePowerUps();

    // Update UI
    updateUI();

    // Draw
    draw();

    requestAnimationFrame(gameLoop);
}

// ==================== 输入处理 ====================
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
        e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

// Touch controls for mobile
document.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const tx = touch.clientX - rect.left;
    const ty = touch.clientY - rect.top;

    // Right half = shoot
    if (tx > CANVAS_W / 2) {
        keys[' '] = true;
    } else {
        // Left half = move towards touch point
        const cx = player ? player.x : CANVAS_W / 2;
        const cy = player ? player.y : CANVAS_H / 2;
        const dx = tx - cx, dy = ty - cy;

        keys['ArrowUp'] = dy < -10;
        keys['ArrowDown'] = dy > 10;
        keys['ArrowLeft'] = dx < -10;
        keys['ArrowRight'] = dx > 10;
    }
}, { passive: false });

document.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const tx = touch.clientX - rect.left;
    const ty = touch.clientY - rect.top;

    if (tx <= CANVAS_W / 2 && player) {
        const dx = tx - player.x, dy = ty - player.y;
        keys['ArrowUp'] = dy < -10;
        keys['ArrowDown'] = dy > 10;
        keys['ArrowLeft'] = dx < -10;
        keys['ArrowRight'] = dx > 10;
    }
}, { passive: false });

document.addEventListener('touchend', () => {
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
    keys[' '] = false;
});

// ==================== 启动 ====================
function init() {
    loadLevel(1);
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'none';
    updateUI();
    // Spawn initial player for display
    spawnPlayer();
    gameRunning = false;
    gameLoop();
}

init();
</script>
